<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>가위캡틴 CRM</title><link rel="stylesheet" href="style.css"></head><body>
<header class="header"><h1>✂️ 가위캡틴 CRM</h1><div class="tabs"><button class="active">다이어리</button><button onclick="location.href='customers.html'">고객관리</button></div></header>
<section class="calendar-box"><div class="calendar-top"><button>◀</button><h2 id="monthTitle"></h2><button>▶</button></div><div class="weekdays"><div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div></div><div id="calendarDays" class="days"></div></section>
<section class="card"><h3>📌 오늘 해야 할 일</h3><div class="todo purple">준오헤어 강남점 방문</div><div class="todo blue">AS 픽업</div><div class="todo orange">결제 확인</div><div class="add-area"><input id="todoInput" placeholder="새 일정 입력"><button onclick="addTodo()">추가</button></div><div id="todoList"></div></section>
<section class="card"><h3>🎯 오늘 방문 고객 5명</h3><div id="visitList"></div></section>
<script src="script.js"></script></body></html>
