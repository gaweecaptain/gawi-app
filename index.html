<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가위캡틴 영업 다이어리</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top-header">
  <div class="logo">✂️ 가위캡틴 CRM</div>
  <div class="month-nav">
    <button>◀</button>
    <h1>2026.04</h1>
    <button>▶</button>
  </div>
</header>

<nav class="tabs">
  <button class="active">다이어리</button>
  <button onclick="location.href='customer.html'">고객관리</button>
</nav>

<section class="calendar-section">
  <div class="weekdays">
    <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
  </div>

  <div class="calendar-grid">
    <div class="day"><span>1</span></div>
    <div class="day selected">
      <span>2</span>
      <small>준오헤어 방문</small>
    </div>
    <div class="day"><span>3</span></div>
    <div class="day"><span>4</span></div>
    <div class="day"><span>5</span></div>
    <div class="day"><span>6</span></div>
    <div class="day"><span>7</span></div>
    <div class="day"><span>8</span></div>
    <div class="day"><span>9</span></div>
    <div class="day"><span>10</span></div>
    <div class="day"><span>11</span></div>
  </div>
</section>

<section class="card">
  <h2>📌 오늘 해야 할 일</h2>

  <div class="todo-item purple">
    <div>
      <strong>준오헤어 강남역점</strong>
      <p>오전 10:30 / 서울 서초구 강남대로</p>
    </div>
  </div>

  <div class="todo-item blue">
    <div>
      <strong>기념식 참석</strong>
      <p>오후 7:00</p>
    </div>
  </div>
</section>

<section class="card">
  <h2>🎯 오늘 의무 방문 고객 5명</h2>

  <div class="customer-item">
    <div>
      <strong>청담헤어</strong>
      <p>010-1111-2222</p>
    </div>
    <input type="checkbox">
  </div>

  <div class="customer-item">
    <div>
      <strong>에이블샵</strong>
      <p>010-3333-4444</p>
    </div>
    <input type="checkbox">
  </div>

  <div class="customer-item">
    <div>
      <strong>박원장</strong>
      <p>010-5555-6666</p>
    </div>
    <input type="checkbox">
  </div>

</section>

</body>
</html>
